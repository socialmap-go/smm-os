<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM OS - Dashboard</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; background-color: #f4f7f6; }
        .header { background-color: #2c3e50; color: white; padding: 15px; text-align: center; }
        .container { padding: 20px; max-width: 900px; margin: auto; }
        
        .form-box { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 20px; }
        .form-box h3 { margin-top: 0; color: #2c3e50; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        
        /* අලුත් Advanced Form එකේ හැඩය (කොටු දෙකකට බෙදීම) */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 13px; font-weight: bold; margin-bottom: 5px; color: #555; }
        .form-box input, .form-box select, .form-box textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px; }
        .full-width { grid-column: span 2; }
        
        .form-box button { background-color: #28a745; color: white; border: none; padding: 15px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 15px; }
        .form-box button:hover { background-color: #218838; }
        #form-msg { margin-top: 15px; font-weight: bold; text-align: center; font-size: 15px; }

        .chat-widget { position: fixed; bottom: 20px; right: 20px; width: 320px; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.3); display: flex; flex-direction: column; overflow: hidden; z-index: 1000; }
        .chat-header { background: #007bff; color: white; padding: 12px; font-weight: bold; cursor: pointer; text-align: center; font-size: 16px; }
        .chat-body { height: 350px; padding: 15px; overflow-y: auto; background: #fafafa; display: flex; flex-direction: column; gap: 10px; }
        .chat-input-area { display: flex; border-top: 1px solid #ccc; background: white; }
        .chat-input-area input { flex: 1; padding: 12px; border: none; outline: none; font-size: 14px; }
        .chat-input-area button { padding: 12px 15px; background: #007bff; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        .message { padding: 10px; border-radius: 8px; max-width: 85%; font-size: 14px; line-height: 1.5; word-wrap: break-word; }
        .user-msg { background: #d1e7dd; align-self: flex-end; border-bottom-right-radius: 0; }
        .ai-msg { background: #e2e3e5; align-self: flex-start; border-bottom-left-radius: 0; }
    </style>
</head>
<body>

<div class="header">
    <h1>SMM OS - ප්‍රධාන පුවරුව</h1>
</div>

<div class="container">
    <div class="form-box">
        <h3>➕ අලුත් සේවාදායකයෙක් පද්ධතියට ඇතුළත් කිරීම (Advanced Client Registry)</h3>
        <div class="form-grid">
            <div class="form-group">
                <label>ව්‍යාපාරයේ නම (Business Name)</label>
                <input type="text" id="bizName" placeholder="උදා: Mapa Solutions">
            </div>
            <div class="form-group">
                <label>සම්බන්ධ කරගත යුතු පුද්ගලයා (Contact Person)</label>
                <input type="text" id="contactName" placeholder="නම ඇතුළත් කරන්න">
            </div>
            <div class="form-group">
                <label>WhatsApp / දුරකථන අංකය</label>
                <input type="text" id="phone" placeholder="උදා: 07x xxx xxxx">
            </div>
            <div class="form-group">
                <label>ඊමේල් ලිපිනය (Email)</label>
                <input type="email" id="email" placeholder="email@example.com">
            </div>
            <div class="form-group">
                <label>ව්‍යාපාරයේ වර්ගය (Niche)</label>
                <input type="text" id="bizNiche" placeholder="උදා: Fashion, Real Estate">
            </div>
            <div class="form-group">
                <label>ප්‍රදේශය (Location)</label>
                <input type="text" id="bizLoc" placeholder="උදා: රත්නපුර">
            </div>
            <div class="form-group">
                <label>SMM පැකේජය (Package Plan)</label>
                <select id="package">
                    <option value="Basic">Basic Plan</option>
                    <option value="Standard">Standard Plan</option>
                    <option value="Premium">Premium Plan</option>
                    <option value="Custom">Custom Plan</option>
                </select>
            </div>
            <div class="form-group">
                <label>සන්නාම වර්ණ (Brand Colors)</label>
                <input type="text" id="colors" placeholder="උදා: #FF0000, නිල් සහ සුදු">
            </div>
            <div class="form-group full-width">
                <label>සමාජ මාධ්‍ය සබැඳි (Social Media Links)</label>
                <input type="text" id="socialLink" placeholder="FB/Insta Page Links මෙහි ඇතුළත් කරන්න">
            </div>
            <div class="form-group full-width">
                <label>විශේෂ උපදෙස් (Special Notes for Designers/Coordinators)</label>
                <textarea id="bizNotes" rows="3" placeholder="පාරිභෝගිකයාගේ විශේෂ අවශ්‍යතා මෙහි සටහන් කරන්න..."></textarea>
            </div>
        </div>
        <button onclick="addClient()">සියලු විස්තර පද්ධතියට ඇතුළත් කරන්න</button>
        <div id="form-msg"></div>
    </div>
</div>

<div class="chat-widget">
    <div class="chat-header" onclick="toggleChat()">🤖 AI සහයකයා (Click to Open)</div>
    <div class="chat-body" id="chat-body" style="display: none;">

    </div>
    <div class="chat-input-area" id="chat-input-area" style="display: none;">
        <input type="text" id="chat-input" placeholder="ඔබේ ගැටලුව ලියන්න...">
        <button onclick="sendMessage()">යවන්න</button>
    </div>
</div>

            msgBox.style.color = "red";
        }
    }
